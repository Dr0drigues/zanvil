name: Tests

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  smoke-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh jq curl

      - name: Verify zsh loads without errors
        run: |
          export ZSH_ENV_DIR="$PWD"
          export HOME="$(mktemp -d)"
          mkdir -p "$HOME/.config" "$HOME/.kube" "$HOME/work"

          # Create minimal config
          cp config.zsh.example "$PWD/config.zsh"

          # Source rc.zsh in zsh and check for errors
          zsh -c '
            export ZSH_ENV_DIR="'"$PWD"'"
            source "$ZSH_ENV_DIR/rc.zsh" 2>&1
            echo "ZSH_ENV_VERSION: $ZSH_ENV_VERSION"
            echo "Modules loaded successfully"
          '

      - name: Verify core files exist
        run: |
          for f in rc.zsh core/ui.zsh core/loader.zsh core/variables.zsh core/aliases.zsh core/hooks.zsh core/commands.zsh core/admin.zsh core/theme.zsh; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f" && exit 1
            fi
          done

      - name: Verify modules structure
        run: |
          for mod in git gitlab kube docker ssh ai project security utils tools work; do
            if [ -f "modules/$mod/init.zsh" ]; then
              echo "OK: modules/$mod/init.zsh"
            else
              echo "MISSING: modules/$mod/init.zsh" && exit 1
            fi
          done

      - name: Test binary-absent fallback warnings
        run: |
          export ZSH_ENV_DIR="$PWD"
          export HOME="$(mktemp -d)"

          check_warning() {
            local module="$1" guard="$2" grep_pattern="$3"
            local out
            out=$(zsh -c "
              ${guard}=true
              ZSH_ENV_DIR='$PWD'
              PATH=/usr/bin:/bin
              source '$PWD/modules/tools/${module}/init.zsh' 2>&1
            ")
            echo "${module}: ${out}"
            echo "${out}" | grep -q "${grep_pattern}" \
              || { echo "FAIL: ${module} warning absent (attendu: ${grep_pattern})"; exit 1; }
          }

          check_warning posting  ZSH_ENV_MODULE_POSTING  "brew install posting"
          check_warning delta    ZSH_ENV_MODULE_DELTA    "brew install git-delta"
          check_warning lazygit  ZSH_ENV_MODULE_LAZYGIT  "brew install lazygit"
          check_warning atuin    ZSH_ENV_MODULE_ATUIN    "brew install atuin"

          echo "All binary-absent fallback warnings OK"

  rust-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cli/Cargo.lock') }}

      - name: Build CLI
        run: cd cli && cargo build --release

      - name: Test CLI commands
        run: |
          export ZSH_ENV_DIR="$PWD"
          CLI="./cli/target/release/zsh-env-cli"

          echo "=== theme list ==="
          $CLI theme list

          echo "=== theme current ==="
          $CLI theme current || true

          echo "=== doctor ==="
          $CLI doctor || true

          echo "=== modules list ==="
          $CLI modules list || true

          echo "=== --help ==="
          $CLI --help
