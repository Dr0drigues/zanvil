# Starship Theme: Tokyo Night Pro
#######################################################################
### A Tokyo Night theme for Starship                                ###
### source: https://starship.rs/presets/tokyo-night.html            ###
#######################################################################
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[‚ĖĎ‚Ėí‚Ėď](#a3aed2)\
${custom.boulanger}\
[ ÓúĎ ](bg:#a3aed2 fg:#090c0c)\
[Óāī](bg:#769ff0 fg:#a3aed2)\
$directory\
[Óāī](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[Óāī](fg:#394260 bg:#212736)\
$java\
$nodejs\
$rust\
$golang\
$php\
\$kubernetes\\\n${custom.zsh_env_context}\\
[Óāī](fg:#212736 bg:#1d2230)\
$time\
[Óāī ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "Óě®"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "Óėß"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "Óėą"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ Ôźļ $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[java]
symbol = "‚ėē"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#f7768e bg:#212736)]($style)'
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]

[kubernetes]
disabled = false
symbol = "‚ėł"
style = "bg:#212736"
format = '[[ $symbol $context(\($namespace\)) ](fg:#326ce5 bg:#212736)]($style)'
detect_folders = ["k8s", "kubernetes", "kube", "helm"]
detect_files = ["k8s.yaml", "k8s.yml", "kubernetes.yaml", "kubernetes.yml", "Chart.yaml"]

# === Module Custom: Contexte Boulanger ===
[custom.boulanger]
description = "Indicateur contexte Boulanger"
command = "echo 'ůįčú'"
when = "test -f ~/.zsh_env/.boulanger_context_cache && tail -1 ~/.zsh_env/.boulanger_context_cache | grep -q true"
format = "[$output ](bg:#a3aed2 fg:#e0af68)"
shell = ["bash", "--noprofile", "--norc"]

# === Module Custom: Contexte Dev (Kube) ===
[custom.zsh_env_context]
description = "Kubernetes context and namespace via zsh-env-cli"
command = "zsh-env-cli context"
when = "command -v zsh-env-cli > /dev/null 2>&1 && command -v kubectl > /dev/null 2>&1 && kubectl config current-context > /dev/null 2>&1"
format = "[[ $output ](fg:#7dcfff bg:#212736)]($style)"
style = "bg:#212736"
shell = ["bash", "--noprofile", "--norc"]
